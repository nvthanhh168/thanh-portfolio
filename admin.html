<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <!-- Màn hình đăng nhập -->
    <div id="loginScreen" class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl">
        <h2 class="text-3xl font-bold text-center mb-6 text-sky-400">Admin Login</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Admin Email" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500">
            <input type="password" id="password" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-sky-500">
            <button id="loginBtn" class="w-full py-3 bg-sky-500 hover:bg-sky-600 rounded-lg text-white font-bold transition-colors">Đăng nhập</button>
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden">Sai tài khoản hoặc mật khẩu!</p>
        </div>
    </div>

    <!-- Màn hình Quản trị (Ban đầu ẩn) -->
    <div id="adminScreen" class="w-full max-w-3xl bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl hidden">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h2 class="text-2xl font-bold text-emerald-400"><i class="fas fa-server mr-2"></i>Dashboard Control</h2>
            <button id="logoutBtn" class="px-4 py-2 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500/40 transition">Đăng xuất</button>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Họ Tên (Tất cả ngôn ngữ)</label>
                <input type="text" id="devName" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Chức danh (Ví dụ: System & Network Engineer)</label>
                <input type="text" id="devTitle" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Mô tả bản thân (Tiếng Việt)</label>
                <textarea id="devDescVN" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-emerald-500"></textarea>
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Mô tả bản thân (Tiếng Anh)</label>
                <textarea id="devDescEN" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-emerald-500"></textarea>
            </div>
            
            <button id="saveBtn" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg text-white font-bold transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> Lưu Thay Đổi Lên Database
            </button>
            <p id="saveMsg" class="text-emerald-400 text-sm text-center hidden">Lưu dữ liệu thành công!</p>
        </div>
    </div>

    <!-- Script kết nối Firebase (Dùng Module chuẩn SPA) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // BẠN DÁN ĐOẠN FIREBASE CONFIG Ở BƯỚC 1 VÀO ĐÂY:
        const firebaseConfig = {
  apiKey: "AIzaSyAM4gySkHXU1jUPXlYsQ51Z7PZjcta3qXw",
  authDomain: "thanh-portfolio-8c122.firebaseapp.com",
  projectId: "thanh-portfolio-8c122",
  storageBucket: "thanh-portfolio-8c122.firebasestorage.app",
  messagingSenderId: "386068468225",
  appId: "1:386068468225:web:36dfe8ac2b3b4e1249a600",
  measurementId: "G-E31NYY0Q07"
};

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Các biến giao diện
        const loginScreen = document.getElementById('loginScreen');
        const adminScreen = document.getElementById('adminScreen');
        const saveBtn = document.getElementById('saveBtn');

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Đã đăng nhập -> Hiện Admin, ẩn Login
                loginScreen.classList.add('hidden');
                adminScreen.classList.remove('hidden');
                
                // Kéo dữ liệu hiện tại từ Database để điền vào Form
                const docSnap = await getDoc(doc(db, "portfolioData", "heroSection"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('devName').value = data.name || "";
                    document.getElementById('devTitle').value = data.title || "";
                    document.getElementById('devDescVN').value = data.descVN || "";
                    document.getElementById('devDescEN').value = data.descEN || "";
                }
            } else {
                // Chưa đăng nhập -> Hiện Login
                loginScreen.classList.remove('hidden');
                adminScreen.classList.add('hidden');
            }
        });

        // Xử lý nút Đăng nhập
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .catch(() => document.getElementById('errorMsg').classList.remove('hidden'));
        });

        // Xử lý nút Đăng xuất
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // Xử lý nút Lưu dữ liệu lên Database
        saveBtn.addEventListener('click', async () => {
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
            try {
                await setDoc(doc(db, "portfolioData", "heroSection"), {
                    name: document.getElementById('devName').value,
                    title: document.getElementById('devTitle').value,
                    descVN: document.getElementById('devDescVN').value,
                    descEN: document.getElementById('devDescEN').value
                });
                document.getElementById('saveMsg').classList.remove('hidden');
                setTimeout(() => document.getElementById('saveMsg').classList.add('hidden'), 3000);
            } catch (error) {
                alert("Lỗi khi lưu: " + error.message);
            }
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu Thay Đổi Lên Database';
        });
    </script>
</body>
</html>
